<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photoshop Assets</title>

<style>
#particles{
position:fixed;
top:0;
left:0;

```
width:100%;
height:100%;

z-index:-1;

pointer-events:none;
```

}

.dot{
    position:absolute;

    border-radius:50%;

    background:white;

    opacity:.3;

    animation:drift linear infinite alternate;
}

@keyframes drift{

    0%{
        transform:
        translate(0,0);
    }

    100%{
        transform:
        translate(
            var(--dx),
            var(--dy)
        );
    }

}*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:Arial,sans-serif;
overflow:hidden;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

border-bottom:1px solid rgba(255,255,255,.08);

background:rgba(0,0,0,.5);

backdrop-filter:blur(20px);
}

.home-btn{
text-decoration:none;
color:white;

padding:12px 20px;

border-radius:14px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.12);

backdrop-filter:blur(20px);
}

.page-title{
color:#aaa;
}

/* MAIN */

.hero{
height:calc(100vh - 80px);

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;
}

/* IMAGE */

.sign{
width:420px;
max-width:80vw;

animation:popup 1.2s ease forwards;

filter:drop-shadow(0 20px 50px rgba(0,0,0,.5));
}

/* COMING SOON BOX */

.coming{
margin-top:30px;

padding:18px 35px;

border-radius:18px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.12);

backdrop-filter:blur(20px);

font-size:1.5rem;
font-weight:700;

animation:fadeUp 1.8s ease forwards;
}

.sub{
margin-top:15px;
color:#999;
}

/* ANIMATION */

@keyframes popup{

0%{
opacity:0;
transform:scale(.2) rotate(-15deg);
}

100%{
opacity:1;
transform:scale(1) rotate(0);
}

}

@keyframes fadeUp{

0%{
opacity:0;
transform:translateY(50px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>
<canvas id="particles"></canvas>

<div class="navbar">

<a href="index.html" class="home-btn">
🏠 Home
</a>

<div class="page-title">
Photoshop Assets
</div>

</div>

<div class="hero">

<img src="stop-sign.png" class="sign">

<div class="coming">
COMING SOON
</div>

<div class="sub">
New Photoshop resources are under construction.
</div>

</div>
<script>

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resize();

window.addEventListener("resize", resize);

const particles = [];

for(let i=0;i<100;i++){

    particles.push({

        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,

        size:Math.random()*3+1,

        vx:(Math.random()-0.5)*0.4,
        vy:(Math.random()-0.5)*0.4,

        opacity:Math.random()*0.6+0.2

    });

}

function animate(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    particles.forEach(p=>{

        p.x += p.vx;
        p.y += p.vy;

        if(p.x < 0 || p.x > canvas.width){
            p.vx *= -1;
        }

        if(p.y < 0 || p.y > canvas.height){
            p.vy *= -1;
        }

        ctx.beginPath();

        ctx.arc(
            p.x,
            p.y,
            p.size,
            0,
            Math.PI*2
        );

        ctx.fillStyle =
            `rgba(255,255,255,${p.opacity})`;

        ctx.fill();

    });

    requestAnimationFrame(
        animate
    );

}

animate();

</script>


</body>
</html>
